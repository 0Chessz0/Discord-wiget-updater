name: Update GD Discord Widget

on:
  # Run every hour. GD stats barely move, and this keeps gdbrowser happy.
  # Cron is UTC. Want a different cadence? "*/30 * * * *" = every 30 min.
  schedule:
    - cron: "0 * * * *"
  # Lets you trigger a run by hand from the Actions tab (great for testing).
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        env:
          GD_USERNAME: chessz0
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python update_widget.py
